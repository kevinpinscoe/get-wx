# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: get-wx
    main: .
    binary: get-wx
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0

archives:
  - id: get-wx-archive
    builds: [get-wx]
    name_template: "get-wx-{{ .Os }}-{{ .Arch }}"
    format: binary

nfpms:
  - id: get-wx-packages
    package_name: get-wx
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/get-wx
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Eastern Tennessee weather forecast fetcher
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [get-wx]

brews:
  - name: get-wx
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/get-wx
    description: Eastern Tennessee weather forecast fetcher
    license: MIT
    test: |
      system "#{bin}/get-wx", "--help"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

release:
  github:
    owner: kevinpinscoe
    name: get-wx
  name_template: "v{{ .Version }}"
  make_latest: true
